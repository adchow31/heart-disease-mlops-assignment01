name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check api/ scripts/ tests/ --output-format=github

  train:
    name: Train Model (fast smoke-train for CI)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fast training (data download -> clean -> train -> package)
        run: python scripts/train.py --fast

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/heart_disease_model.joblib
            models/model_metadata.json
          retention-days: 14

      - name: Upload cleaned dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-dataset
          path: data/heart_disease_clean.csv
          retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models

      - name: Run pytest with coverage
        run: pytest tests/ -v --cov=api --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: heart-disease-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container
        run: |
          docker run -d --name heart-disease-api -p 8000:8000 heart-disease-api:ci
          echo "Waiting for the API to become healthy..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health | tee health_response.json
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":3,"trestbps":145,"chol":233,"fbs":1,"restecg":0,"thalach":150,"exang":0,"oldpeak":2.3,"slope":0,"ca":0,"thal":1}' \
            | tee predict_response.json
          docker logs heart-disease-api

      - name: Fail the job if the API didn't come up healthy
        run: |
          grep -q '"status":"ok"' health_response.json

      - name: Upload smoke-test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-test-logs
          path: |
            health_response.json
            predict_response.json
          retention-days: 14

      - name: Clean up container
        if: always()
        run: docker rm -f heart-disease-api || true
