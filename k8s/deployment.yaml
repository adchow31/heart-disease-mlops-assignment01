apiVersion: v1
kind: Namespace
metadata:
  name: mlops-assignment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-disease-api
  namespace: mlops-assignment
  labels:
    app: heart-disease-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heart-disease-api
  template:
    metadata:
      labels:
        app: heart-disease-api
    spec:
      containers:
        - name: heart-disease-api
          image: heart-disease-api:latest
          # Built locally with `docker build`; imagePullPolicy Never/IfNotPresent
          # tells the local cluster to use that image instead of pulling from a
          # registry. Minikube users: run `minikube image load heart-disease-api:latest`
          # first, or set `eval $(minikube docker-env)` before building.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
